name: Deploy Staging Preview

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-staging
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Set staging domain
        run: echo "staging.marlonavery.com" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy staging preview
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true
